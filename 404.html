<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>សាលាអន្តរជាតិ អាយធីឃេ</title>
  <link rel="icon" type="image/jpeg" href="img/1.jpg">
  <!-- Fonts -->
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>

  <style>
    @font-face {
      font-family: 'Kantumruy-Light';
      src: url('fonts/Kantumruy-Light.ttf') format('truetype'),
        url('fonts/Kantumruy-Light.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Kantumruy-Light', sans-serif;
      font-feature-settings: "kern" 1, "liga" 1;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: #1f0637;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      padding: 60px 40px;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 550px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      z-index: 10;
    }

    /* Animated Gears */
    .gears-container {
      position: relative;
      height: 150px;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .gear {
      position: absolute;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gear i {
      display: block;
      line-height: 0;
    }

    .gear-1 {
      font-size: 80px;
      animation: spin-right 4s linear infinite;
      left: 35%;
      top: 20px;
      color: rgba(255, 255, 255, 0.9);
    }

    .gear-2 {
      font-size: 50px;
      animation: spin-left 3s linear infinite;
      left: 52%;
      top: 10px;
      color: rgba(255, 255, 255, 0.7);
    }

    .gear-3 {
      font-size: 40px;
      animation: spin-right 3s linear infinite;
      left: 55%;
      top: 60px;
      color: rgba(255, 255, 255, 0.5);
    }

    @keyframes spin-right {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-left {
      100% {
        transform: rotate(-360deg);
      }
    }

    h1 {
      font-family: 'Kantumruy-Light';
      color: #ffffff;
      font-size: 26px;
      margin-bottom: 15px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      background: linear-gradient(45deg, #ff6b6b, #ee5253);
      padding: 12px 35px;
      border-radius: 50px;
      font-weight: bold;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
    }

    /* Floating Background Shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      opacity: 0.8;
      animation: float 8s ease-in-out infinite alternate;
    }

    .shape-1 {
      background: #fee140;
      width: 300px;
      height: 300px;
      top: -50px;
      left: -50px;
      opacity: 0.5;
    }

    .shape-2 {
      background: #fa709a;
      width: 400px;
      height: 400px;
      bottom: -80px;
      right: -80px;
      opacity: 0.5;
      animation-delay: -2s;
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
      }

      100% {
        transform: translateY(30px) scale(1.05);
      }
    }
  </style>
</head>

<body>

  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>

  <div class="container">
    <div class="gears-container">
      <div class="gear gear-1"><i class="fi fi-rr-settings"></i></div>
      <div class="gear gear-2"><i class="fi fi-rr-settings"></i></div>
      <div class="gear gear-3"><i class="fi fi-rr-settings"></i></div>
    </div>

    <h1 style="font-family: 'Kantumruy-Light'; font-weight: bold;">សាលាអន្តរជាតិ អាយធីឃេ</h1>
    <p>សូមអភ័យទោស! ប្រព័ន្ធរបស់យើងកំពុងធ្វើការអាប់ដេតដើម្បីឱ្យកាន់តែប្រសើរឡើង។<br>សូមមេត្តារង់ចាំបន្តិច...</p>

    <a href="login.html" class="btn-home">
      <i class="fi fi-rr-refresh"></i>
      ព្យាយាមម្តងទៀត (Retry)
    </a>

    <p style="font-size: 12px; color: rgba(255, 255, 255, 0.5); margin-top: 40px;">© 2026 សាលាអន្តរជាតិ អាយធី ឃេ.</p>
  </div>

</body>

</html>
